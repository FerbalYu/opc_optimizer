[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --tb=short
filterwarnings =
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14 or greater\.:UserWarning
    ignore:coroutine 'AsyncMockMixin\._execute_mock_call' was never awaited:RuntimeWarning:unittest\.mock
